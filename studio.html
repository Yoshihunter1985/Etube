<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Studio</title>
<style>
  :root{
    --cream:#FFF8EC;
    --ink:#3A3A3A;
    --coral:#FF6B6B;
    --teal:#4ECDC4;
    --sun:#FFD93D;
    --grass:#95E06C;
    --grape:#B185DB;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding:32px;
    max-width:720px;
    margin-inline:auto;
  }
  h1{ font-size:22px; margin-bottom:4px; }
  p.sub{ color:#8a8a8a; margin-top:0; font-size:14px; }

  textarea{
    width:100%;
    min-height:160px;
    border-radius:16px;
    border:2px solid #e8dcc8;
    padding:14px;
    font-family:ui-monospace, Consolas, monospace;
    font-size:13px;
    resize:vertical;
  }

  .row{ display:flex; gap:12px; margin-top:14px; align-items:center; }

  button{
    border:none;
    border-radius:14px;
    padding:12px 22px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    color:#fff;
    transition:transform 0.1s ease, opacity 0.15s ease;
  }
  button:active{ transform:scale(0.96); }
  button:disabled{ opacity:0.4; cursor:not-allowed; }

  .btn-start{ background:var(--teal); }
  .btn-push{ background:var(--coral); }

  ul.list{ list-style:none; padding:0; margin-top:24px; display:flex; flex-direction:column; gap:8px; }
  li{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 14px;
    border-radius:12px;
    background:#fff;
    border:2px solid #eee;
    font-size:14px;
  }
  li .badge{
    width:10px; height:10px; border-radius:50%; flex:0 0 auto;
  }
  .badge.pending{ background:#ccc; }
  .badge.working{ background:var(--sun); animation:pulse 1s infinite; }
  .badge.done{ background:var(--grass); }
  .badge.error{ background:var(--coral); }
  @keyframes pulse{ 50%{ opacity:0.3; } }

  li .title{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  li .status-text{ color:#999; font-size:12px; }

  #pushResult{
    margin-top:16px;
    white-space:pre-wrap;
    font-family:ui-monospace, Consolas, monospace;
    font-size:12px;
    background:#fff;
    border-radius:12px;
    padding:14px;
    display:none;
    border:2px solid #eee;
  }

  #summary{ margin-top:16px; font-size:14px; display:none; }
</style>
</head>
<body>

  <h1>Video Studio</h1>
  <p class="sub">Paste YouTube URLs, one per line. Hit Start, let it run, push when it's done.</p>

  <textarea id="urls" placeholder="https://www.youtube.com/watch?v=...
https://www.youtube.com/watch?v=...
https://www.youtube.com/watch?v=..."></textarea>

  <div class="row">
    <button class="btn-start" id="startBtn">Start</button>
    <button class="btn-push" id="pushBtn" disabled>Push to GitHub</button>
  </div>

  <div id="summary"></div>
  <ul class="list" id="list"></ul>
  <pre id="pushResult"></pre>

<script>
  const startBtn = document.getElementById('startBtn');
  const pushBtn = document.getElementById('pushBtn');
  const urlsBox = document.getElementById('urls');
  const list = document.getElementById('list');
  const summary = document.getElementById('summary');
  const pushResult = document.getElementById('pushResult');

  let polling = null;

  function statusText(item){
    if (item.status === 'pending') return 'waiting...';
    if (item.status === 'working') return 'working...';
    if (item.status === 'done') return 'done';
    if (item.status === 'error') return item.error || 'failed';
    return '';
  }

  function render(state){
    list.innerHTML = '';
    state.items.forEach(item => {
      const li = document.createElement('li');
      const label = item.title || item.url;
      li.innerHTML = `
        <span class="badge ${item.status}"></span>
        <span class="title">${label}</span>
        <span class="status-text">${statusText(item)}</span>
      `;
      list.appendChild(li);
    });

    const total = state.items.length;
    const doneCount = state.items.filter(i => i.status === 'done').length;
    const errorCount = state.items.filter(i => i.status === 'error').length;

    if (total > 0) {
      summary.style.display = 'block';
      summary.textContent = state.running
        ? `Working... ${doneCount + errorCount} of ${total} processed`
        : `Complete: ${doneCount} added, ${errorCount} failed`;
    }

    startBtn.disabled = state.running;
    pushBtn.disabled = state.running || doneCount === 0;

    if (!state.running && polling) {
      clearInterval(polling);
      polling = null;
    }
  }

  async function poll(){
    const res = await fetch('/api/status');
    const state = await res.json();
    render(state);
  }

  startBtn.addEventListener('click', async () => {
    const urls = urlsBox.value.split('\n').map(s => s.trim()).filter(Boolean);
    if (!urls.length) return;

    pushResult.style.display = 'none';
    const res = await fetch('/api/batch', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({urls})
    });

    if (!res.ok) {
      const err = await res.json();
      alert(err.error || 'Could not start batch');
      return;
    }

    if (polling) clearInterval(polling);
    polling = setInterval(poll, 1500);
    poll();
  });

  pushBtn.addEventListener('click', async () => {
    pushBtn.disabled = true;
    pushBtn.textContent = 'Pushing...';
    const res = await fetch('/api/push', {method: 'POST'});
    const data = await res.json();
    pushResult.style.display = 'block';
    pushResult.textContent = (data.add_output || '') + (data.commit_output || '') + (data.push_output || '') + (data.error || '');
    pushBtn.textContent = 'Push to GitHub';
    pushBtn.disabled = false;
  });

  // Pick up an in-progress batch if the page is reloaded mid-run
  poll();
</script>
</body>
</html>
